<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="article-default-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .text-line { stroke: #0072CE; stroke-width: 2; fill: none; }
      .text-line-light { stroke: #C5D8EE; stroke-width: 1.5; fill: none; }
    </style>
  </defs>
  <title id="article-default-title">Electronic component industry article</title>

  <!-- Background -->
  <rect width="400" height="240" fill="transparent"/>

  <!-- Left side: Circuit pattern background -->
  <g transform="translate(20, 30)">
    <!-- Circuit trace lines -->
    <path class="text-line-light" d="M 10 10 L 40 10 L 40 40 L 70 40"/>
    <path class="text-line-light" d="M 70 10 L 100 10 L 100 60"/>
    <path class="text-line-light" d="M 20 60 L 50 60 L 50 90"/>
    <path class="text-line-light" d="M 60 80 L 90 80 L 90 120"/>

    <!-- Circuit nodes -->
    <circle cx="10" cy="10" r="2" class="primary" opacity="0.6"/>
    <circle cx="40" cy="10" r="2" class="primary" opacity="0.6"/>
    <circle cx="40" cy="40" r="2" class="primary" opacity="0.6"/>
    <circle cx="70" cy="40" r="2" class="primary" opacity="0.6"/>
    <circle cx="100" cy="10" r="2" class="primary" opacity="0.6"/>
    <circle cx="100" cy="60" r="2" class="primary" opacity="0.6"/>
    <circle cx="20" cy="60" r="2" class="primary" opacity="0.6"/>
    <circle cx="50" cy="60" r="2" class="primary" opacity="0.6"/>
    <circle cx="50" cy="90" r="2" class="primary" opacity="0.6"/>
    <circle cx="60" cy="80" r="2" class="primary" opacity="0.6"/>
    <circle cx="90" cy="80" r="2" class="primary" opacity="0.6"/>
    <circle cx="90" cy="120" r="2" class="primary" opacity="0.6"/>
  </g>

  <!-- Right side: Document/article representation -->
  <g transform="translate(160, 30)">
    <!-- Article frame -->
    <rect x="0" y="0" width="180" height="170" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>

    <!-- Title bar -->
    <rect x="0" y="0" width="180" height="20" class="primary" rx="2"/>
    <line x1="10" y1="8" x2="170" y2="8" stroke="#FFFFFF" stroke-width="1"/>

    <!-- Article content lines -->
    <line x1="15" y1="35" x2="165" y2="35" class="text-line" stroke-width="1.5"/>
    <line x1="15" y1="50" x2="165" y2="50" class="text-line" stroke-width="1.5"/>
    <line x1="15" y1="65" x2="155" y2="65" class="text-line" stroke-width="1.5"/>

    <line x1="15" y1="85" x2="165" y2="85" class="text-line-light"/>
    <line x1="15" y1="98" x2="165" y2="98" class="text-line-light"/>
    <line x1="15" y1="111" x2="155" y2="111" class="text-line-light"/>

    <line x1="15" y1="130" x2="80" y2="130" class="text-line-light"/>

    <!-- Accent corner indicator -->
    <circle cx="162" cy="12" r="3" class="accent" opacity="0.8"/>
  </g>

  <!-- Bottom label -->
  <text x="200" y="220" font-family="Arial, sans-serif" font-size="11" fill="#0072CE" text-anchor="middle" font-weight="500">Industry News &amp; Articles</text>

</svg>