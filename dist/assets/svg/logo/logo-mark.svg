<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" role="img" aria-labelledby="beilu-mark-title">
  <title id="beilu-mark-title">BeiLuo</title>

  <!-- Chip body -->
  <rect x="10" y="10" width="28" height="28" rx="4" ry="4" fill="#0072CE"/>

  <!-- IC interior crosshair (white) -->
  <line x1="24" y1="17" x2="24" y2="31" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <line x1="17" y1="24" x2="31" y2="24" stroke="white" stroke-width="2" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="4" y1="15" x2="10" y2="15" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="24" x2="10" y2="24" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="4" y1="33" x2="10" y2="33" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="38" y1="15" x2="44" y2="15" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="24" x2="44" y2="24" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="38" y1="33" x2="44" y2="33" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>

  <!-- Top pins -->
  <line x1="17" y1="4" x2="17" y2="10" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="4" x2="31" y2="10" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="17" y1="38" x2="17" y2="44" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>
  <line x1="31" y1="38" x2="31" y2="44" stroke="#0072CE" stroke-width="2" stroke-linecap="round"/>

  <!-- Accent node: orange dot on middle-right pin tip -->
  <circle cx="44" cy="24" r="3" fill="#F5821F"/>
</svg>
