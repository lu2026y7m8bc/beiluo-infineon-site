<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 40" role="img" aria-labelledby="beilu-logo-title">
  <title id="beilu-logo-title">BeiLuo</title>

  <!-- Chip body -->
  <rect x="7" y="9" width="24" height="22" rx="3" ry="3" fill="#0072CE"/>

  <!-- IC interior crosshair (white, suggests circuit internals) -->
  <line x1="19" y1="15" x2="19" y2="25" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="14" y1="20" x2="24" y2="20" stroke="white" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Left pins -->
  <line x1="1" y1="13" x2="7" y2="13" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="20" x2="7" y2="20" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="1" y1="27" x2="7" y2="27" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Right pins -->
  <line x1="31" y1="13" x2="37" y2="13" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="31" y1="20" x2="37" y2="20" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="31" y1="27" x2="37" y2="27" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Top pins -->
  <line x1="14" y1="3" x2="14" y2="9" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="3" x2="24" y2="9" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Bottom pins -->
  <line x1="14" y1="31" x2="14" y2="37" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="24" y1="31" x2="24" y2="37" stroke="#0072CE" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Accent node: orange dot on middle-right pin tip -->
  <circle cx="37" cy="20" r="2.5" fill="#F5821F"/>

  <!-- BeiLuo wordmark — Inter loaded by page; "Bei" dark, "Luo" brand blue -->
  <text font-family="Inter, system-ui, sans-serif" font-weight="700" font-size="21" y="28">
    <tspan x="44" fill="#1A2433">Bei</tspan><tspan fill="#0072CE">Luo</tspan>
  </text>
</svg>
