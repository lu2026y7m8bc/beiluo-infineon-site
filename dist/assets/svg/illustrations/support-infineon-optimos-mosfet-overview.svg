<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="support-mosfet-trouble-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .warn { fill: #E8820C; }
    </style>
  </defs>
  <title id="support-mosfet-trouble-title">Infineon OptiMOS MOSFET package with a wrench for troubleshooting and a thermometer indicating thermal analysis</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- MOSFET package (TO-252 style) -->
  <g transform="translate(80, 100)">
    <rect x="0" y="0" width="90" height="60" class="primary" rx="4"/>
    <rect x="6" y="6" width="78" height="48" class="neutral" rx="2"/>
    <rect x="20" y="60" width="8" height="30" class="accent"/>
    <rect x="41" y="60" width="8" height="30" class="accent"/>
    <rect x="62" y="60" width="8" height="30" class="accent"/>
    <circle cx="45" cy="30" r="12" fill="none" stroke="#0072CE" stroke-width="2"/>
    <line x1="45" y1="22" x2="45" y2="38" stroke="#0072CE" stroke-width="2"/>
  </g>

  <!-- Wrench (troubleshooting) -->
  <g transform="translate(220, 60)">
    <path d="M 60 0 Q 80 0 80 20 Q 80 34 68 38 L 20 86 Q 12 94 4 86 Q -4 78 4 70 L 52 22 Q 40 10 52 0 Q 56 -2 60 0 Z" class="warn"/>
    <circle cx="66" cy="18" r="9" fill="#FBEFD9"/>
  </g>

  <!-- Thermometer -->
  <g transform="translate(300, 150)">
    <rect x="10" y="0" width="14" height="60" rx="7" class="neutral" stroke="#E8820C" stroke-width="2"/>
    <circle cx="17" cy="70" r="16" class="warn"/>
    <rect x="13" y="30" width="8" height="42" class="warn"/>
  </g>

  <!-- Warning triangle -->
  <g transform="translate(150, 200)">
    <polygon points="20,0 40,36 0,36" class="warn"/>
    <text x="20" y="30" font-family="Arial, sans-serif" font-size="18" fill="#FFFFFF" text-anchor="middle" font-weight="bold">!</text>
  </g>

  <text x="200" y="270" font-family="Arial, sans-serif" font-size="12" fill="#5B6B7F" text-anchor="middle">Gate-drive · dead-time · thermal checks</text>
</svg>
