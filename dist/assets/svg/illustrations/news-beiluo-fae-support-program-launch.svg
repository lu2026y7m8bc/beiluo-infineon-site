<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="news-fae-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .skin { fill: #F5C6A0; }
    </style>
  </defs>
  <title id="news-fae-title">Field application engineer wearing a headset assisting a customer with an Infineon chip design question</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- FAE engineer figure -->
  <g transform="translate(70, 90)">
    <circle cx="40" cy="30" r="26" class="skin"/>
    <path d="M 10 100 Q 10 55 40 55 Q 70 55 70 100 L 70 130 L 10 130 Z" class="primary"/>
    <!-- headset -->
    <path d="M 12 26 Q 12 -4 40 -4 Q 68 -4 68 26" fill="none" stroke="#1A2433" stroke-width="4"/>
    <circle cx="12" cy="30" r="7" class="accent"/>
    <circle cx="68" cy="30" r="7" class="accent"/>
    <path d="M 68 34 L 78 44" stroke="#1A2433" stroke-width="3" stroke-linecap="round"/>
    <circle cx="80" cy="46" r="4" fill="#1A2433"/>
  </g>

  <!-- Speech bubble with checkmark -->
  <g transform="translate(220, 60)">
    <path d="M 10 0 L 130 0 Q 145 0 145 15 L 145 65 Q 145 80 130 80 L 40 80 L 20 100 L 25 80 L 10 80 Q 0 80 0 65 L 0 15 Q 0 0 10 0 Z" class="neutral" stroke="#0072CE" stroke-width="2"/>
    <path d="M 40 40 L 62 58 L 105 22" fill="none" stroke="#1F9D55" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Chip icon on desk -->
  <g transform="translate(180, 190)">
    <rect x="0" y="0" width="44" height="44" class="primary" rx="3"/>
    <rect x="5" y="5" width="34" height="34" class="neutral" rx="2"/>
    <line x1="14" y1="12" x2="14" y2="32" stroke="#0072CE" stroke-width="1.5"/>
    <line x1="22" y1="12" x2="22" y2="32" stroke="#0072CE" stroke-width="1.5"/>
    <line x1="30" y1="12" x2="30" y2="32" stroke="#0072CE" stroke-width="1.5"/>
  </g>

  <text x="290" y="250" font-family="Arial, sans-serif" font-size="11" fill="#5B6B7F" text-anchor="middle">FAE Support</text>
</svg>
