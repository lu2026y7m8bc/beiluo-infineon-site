<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="icon-igbt-title"
     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title id="icon-igbt-title">IGBT icon</title>
  <!-- power module outline -->
  <rect x="4" y="5" width="16" height="14" rx="2"/>
  <!-- gate terminal (left) -->
  <line x1="4" y1="12" x2="1" y2="12"/>
  <!-- gate bar -->
  <line x1="8" y1="8" x2="8" y2="16"/>
  <!-- channel connection -->
  <line x1="8" y1="12" x2="12" y2="12"/>
  <!-- collector (top) -->
  <line x1="15" y1="5" x2="15" y2="2"/>
  <!-- emitter (bottom) -->
  <line x1="15" y1="19" x2="15" y2="22"/>
  <!-- arrow (switch symbol pointing right) -->
  <polyline points="12,9 16,12 12,15"/>
  <line x1="12" y1="9" x2="12" y2="15"/>
</svg>
