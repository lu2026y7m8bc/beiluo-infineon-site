<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" role="img" aria-labelledby="icon-inventory-title"
     fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
  <title id="icon-inventory-title">Inventory icon</title>
  <!-- warehouse rack outline -->
  <rect x="3" y="3" width="18" height="18" rx="1"/>
  <!-- shelf dividers -->
  <line x1="3" y1="9" x2="21" y2="9"/>
  <line x1="3" y1="15" x2="21" y2="15"/>
  <!-- stocked items, top shelf -->
  <line x1="7" y1="4" x2="7" y2="8"/>
  <line x1="11" y1="4" x2="11" y2="8"/>
  <line x1="15" y1="4" x2="15" y2="8"/>
  <!-- stocked items, middle shelf -->
  <line x1="7" y1="10" x2="7" y2="14"/>
  <line x1="11" y1="10" x2="11" y2="14"/>
  <line x1="15" y1="10" x2="15" y2="14"/>
  <!-- stocked items, bottom shelf -->
  <line x1="7" y1="16" x2="7" y2="20"/>
  <line x1="11" y1="16" x2="11" y2="20"/>
  <line x1="15" y1="16" x2="15" y2="20"/>
</svg>
