<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{#if seo.title}}{{seo.title}}{{else}}{{seo.defaultTitle}}{{/if}}</title>
<meta name="description" content="{{#if seo.description}}{{seo.description}}{{else}}{{seo.defaultDescription}}{{/if}}">
{{#if seo.canonical}}<link rel="canonical" href="{{seo.canonical}}">{{/if}}

<!-- Open Graph -->
<meta property="og:type" content="website">
<meta property="og:title" content="{{#if seo.title}}{{seo.title}}{{else}}{{seo.defaultTitle}}{{/if}}">
<meta property="og:description" content="{{#if seo.description}}{{seo.description}}{{else}}{{seo.defaultDescription}}{{/if}}">
{{#if seo.canonical}}<meta property="og:url" content="{{seo.canonical}}">{{/if}}
{{#if seo.ogImage}}<meta property="og:image" content="{{seo.ogImage}}">{{/if}}
{{#if seo.siteName}}<meta property="og:site_name" content="{{seo.siteName}}">{{/if}}
<meta name="twitter:card" content="summary_large_image">

<!-- Fonts (display=swap 在 tokens.css 的 @import；此处 preconnect 加速) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<!-- Styles -->
<link rel="stylesheet" href="/assets/css/style.css">
