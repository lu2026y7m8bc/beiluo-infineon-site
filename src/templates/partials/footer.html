<footer class="site-footer">
  <div class="container">
    <!-- 4-Column Grid -->
    <div class="site-footer__grid">

      <!-- Column 1: Brand (rendered directly from brand.* — richer 3-line layout
           than footer.columns[0]'s generic heading+links shape provides) -->
      <div class="site-footer__column">
        <h3 class="site-footer__heading">{{brand.name}}</h3>
        <p class="site-footer__tagline">{{brand.slogan}}</p>
        <p class="site-footer__intro">{{brand.oneLiner}}</p>
      </div>

      <!-- Columns 2-4: data-driven from site.json's footer.columns (index 0 is the
           brand column already rendered above, skipped via an index-truthiness check) -->
      {{#each footer.columns}}
      {{#if @index}}
      <div class="site-footer__column">
        <h3 class="site-footer__heading">{{heading}}</h3>
        <ul class="site-footer__list" role="list">
          {{#each links}}
          <li class="site-footer__item">
            <a href="{{href}}" class="site-footer__link"{{#if external}} target="_blank" rel="noopener noreferrer"{{/if}}>{{label}}</a>
          </li>
          {{/each}}
        </ul>
      </div>
      {{/if}}
      {{/each}}

    </div><!-- /.site-footer__grid -->

    <!-- Bottom Bar -->
    <div class="site-footer__bottom">
      <p class="site-footer__copyright">{{footer.copyright}}</p>
      <div class="site-footer__meta-links">
        <a href="{{footer.sitemapHref}}" class="site-footer__meta-link">Sitemap</a>
        <a href="{{footer.robotsHref}}" class="site-footer__meta-link">robots.txt</a>
      </div>
    </div>

  </div><!-- /.container -->
</footer>
