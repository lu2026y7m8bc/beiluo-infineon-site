<header class="site-nav" data-nav>
  <div class="container">
    <div class="site-nav__inner">

      <!-- Logo + Slogan -->
      <a href="/" class="site-nav__logo-link" aria-label="{{logo.alt}}">
        <img class="site-nav__logo-img" src="{{logo.src}}" alt="{{logo.alt}}" width="{{logo.width}}" height="{{logo.height}}">
        <span class="site-nav__slogan">{{brand.slogan}}</span>
      </a>

      <!-- Desktop Main Navigation (data-driven from site.json's nav.items) -->
      <nav class="site-nav__links" aria-label="Main">
        <ul class="site-nav__list" role="list">
          {{#each nav.items}}
          <li class="site-nav__item{{#if megaMenu}} has-megamenu{{/if}}">
            <a class="site-nav__link" href="{{href}}"{{#if megaMenu}} data-megamenu-trigger aria-haspopup="true" aria-expanded="false"{{/if}}>{{label}}</a>
            {{#if megaMenu}}
            <!-- Mega menu panel is a child of .has-megamenu so the <li> is one contiguous
                 hover zone covering both trigger and panel. CSS sets .has-megamenu to
                 position:static so the panel's position:absolute is relative to <header>. -->
            <div class="mega-menu" data-megamenu aria-hidden="true">
              <div class="container">
                <ul class="mega-menu__categories" role="list">
                  {{#each navCategories}}
                  <li class="mega-menu__category">
                    <a class="mega-menu__cat-link" href="/products/{{slug}}/">{{name}}</a>
                  </li>
                  {{/each}}
                </ul>
              </div>
            </div><!-- /.mega-menu -->
            {{/if}}
          </li>
          {{/each}}
        </ul>
      </nav>

      <!-- Desktop CTA -->
      <a href="/contact/" class="btn btn--cta site-nav__cta">Get a Quote</a>

      <!-- Mobile Hamburger Toggle (≥44px) -->
      <button
        class="site-nav__hamburger"
        type="button"
        data-drawer-toggle
        aria-expanded="false"
        aria-controls="nav-drawer"
        aria-label="Open navigation menu"
      >
        <span class="site-nav__bar" aria-hidden="true"></span>
        <span class="site-nav__bar" aria-hidden="true"></span>
        <span class="site-nav__bar" aria-hidden="true"></span>
      </button>

    </div><!-- /.site-nav__inner -->
  </div><!-- /.container -->

  <!-- Mobile Drawer -->
  <div class="site-nav__drawer" data-drawer id="nav-drawer" aria-hidden="true" inert>
    <nav aria-label="Mobile navigation">
      <ul class="site-nav__drawer-list" role="list">
        {{#each nav.items}}
        <li class="site-nav__drawer-item">
          <a class="site-nav__drawer-link" href="{{href}}">{{label}}</a>
        </li>
        {{/each}}
      </ul>
      <a href="/contact/" class="btn btn--cta site-nav__drawer-cta">Get a Quote</a>
    </nav>
  </div><!-- /.site-nav__drawer -->

</header>
