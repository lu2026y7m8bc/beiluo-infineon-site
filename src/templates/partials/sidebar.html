<aside class="sidebar" aria-label="{{#if sidebarLabel}}{{sidebarLabel}}{{else}}Section navigation{{/if}}">
  {{#each sidebarSections}}
  <nav class="sidebar__group" aria-label="{{title}}">
    <h2 class="sidebar__heading">{{title}}</h2>
    <ul class="sidebar__list">
      {{#each items}}
      <li class="sidebar__item"><a class="sidebar__link{{#if active}} is-active{{/if}}" href="{{url}}">{{name}}</a></li>
      {{/each}}
    </ul>
  </nav>
  {{/each}}
</aside>
