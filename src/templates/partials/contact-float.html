<aside class="contact-float" aria-label="Quick contact">
  <a class="contact-float__btn contact-float__btn--wa" href="{{contact.whatsappHref}}" target="_blank" rel="noopener noreferrer" aria-label="Contact us on WhatsApp">
    <!-- placeholder WhatsApp icon (Phase 3: real SVG) -->
    <svg class="contact-float__icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <rect width="24" height="24" rx="12" fill="#25D366"/>
      <path d="M7 12 Q12 6 17 12 Q12 18 7 12Z" fill="#fff"/>
    </svg>
    <span class="contact-float__label">WhatsApp</span>
  </a>
  <button class="contact-float__btn contact-float__btn--wc" type="button" aria-label="Show WeChat QR" aria-haspopup="true" aria-expanded="false" aria-controls="wechat-qr-popover" data-wechat-toggle data-wechat="{{#if contact.wechat}}{{contact.wechat}}{{/if}}">
    <!-- placeholder WeChat icon (Phase 3: real SVG) -->
    <svg class="contact-float__icon" width="24" height="24" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
      <rect width="24" height="24" rx="12" fill="#07C160"/>
      <circle cx="9" cy="12" r="2" fill="#fff"/>
      <circle cx="15" cy="12" r="2" fill="#fff"/>
    </svg>
    <span class="contact-float__label">WeChat</span>
  </button>

  <div class="contact-float__popover" id="wechat-qr-popover" role="dialog" aria-label="WeChat QR code" data-wechat-popover hidden>
    <button class="contact-float__popover-close" type="button" aria-label="Close" data-wechat-popover-close>&times;</button>
    {{#if contact.wechatQrSrc}}
    <img class="contact-float__popover-qr" src="{{contact.wechatQrSrc}}" alt="Scan to add {{brand.name}} on WeChat" width="140" height="140" loading="lazy">
    {{/if}}
    {{#if contact.wechat}}<p class="contact-float__popover-id">WeChat ID: {{contact.wechat}}</p>{{/if}}
  </div>
</aside>
