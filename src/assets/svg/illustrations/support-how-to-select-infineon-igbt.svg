<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="support-igbt-select-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .success { fill: #1F9D55; }
    </style>
  </defs>
  <title id="support-igbt-select-title">Magnifying glass inspecting an Infineon IGBT module beside a parameter selection checklist</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- IGBT module -->
  <g transform="translate(70, 90)">
    <rect x="0" y="0" width="110" height="110" class="primary" rx="5"/>
    <rect x="8" y="8" width="94" height="94" class="neutral" rx="3"/>
    <line x1="25" y1="20" x2="25" y2="90" stroke="#0072CE" stroke-width="2"/>
    <line x1="45" y1="20" x2="45" y2="90" stroke="#0072CE" stroke-width="2"/>
    <line x1="65" y1="20" x2="65" y2="90" stroke="#0072CE" stroke-width="2"/>
    <line x1="85" y1="20" x2="85" y2="90" stroke="#0072CE" stroke-width="2"/>
    <!-- terminal pins -->
    <rect x="-8" y="30" width="8" height="12" class="accent"/>
    <rect x="-8" y="55" width="8" height="12" class="accent"/>
    <rect x="-8" y="80" width="8" height="12" class="accent"/>
    <rect x="110" y="30" width="8" height="12" class="accent"/>
    <rect x="110" y="55" width="8" height="12" class="accent"/>
    <rect x="110" y="80" width="8" height="12" class="accent"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(150, 60)">
    <circle cx="35" cy="35" r="32" fill="none" stroke="#F5821F" stroke-width="6"/>
    <line x1="58" y1="58" x2="82" y2="82" stroke="#F5821F" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- Selection checklist card -->
  <g transform="translate(250, 90)">
    <rect x="0" y="0" width="110" height="130" class="neutral" stroke="#0072CE" stroke-width="2" rx="4"/>
    <path d="M 12 22 L 18 28 L 30 14" fill="none" stroke="#1F9D55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="40" y1="22" x2="95" y2="22" stroke="#0072CE" stroke-width="2"/>
    <path d="M 12 52 L 18 58 L 30 44" fill="none" stroke="#1F9D55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="40" y1="52" x2="95" y2="52" stroke="#0072CE" stroke-width="2"/>
    <path d="M 12 82 L 18 88 L 30 74" fill="none" stroke="#1F9D55" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="40" y1="82" x2="95" y2="82" stroke="#0072CE" stroke-width="2"/>
    <circle cx="18" cy="110" r="6" fill="none" stroke="#5B6B7F" stroke-width="2"/>
    <line x1="40" y1="112" x2="80" y2="112" stroke="#5B6B7F" stroke-width="2"/>
  </g>
</svg>
