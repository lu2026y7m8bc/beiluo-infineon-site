<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="about-hero-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
    </style>
  </defs>
  <title id="about-hero-title">BeiLuo global electronic component distributor</title>

  <!-- Background -->
  <rect width="400" height="300" fill="transparent"/>

  <!-- Globe -->
  <circle cx="120" cy="130" r="70" class="neutral" stroke="#0072CE" stroke-width="2"/>
  <circle cx="120" cy="130" r="70" fill="none" stroke="#0072CE" stroke-width="1.5" opacity="0.5"/>

  <!-- Continents suggestion (simple shapes) -->
  <ellipse cx="100" cy="110" rx="12" ry="15" class="primary" opacity="0.7"/>
  <circle cx="140" cy="130" r="10" class="primary" opacity="0.7"/>
  <polygon points="85,150 95,160 105,155" class="primary" opacity="0.7"/>

  <!-- Latitude lines -->
  <line x1="50" y1="130" x2="190" y2="130" stroke="#0072CE" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="120" rx="65" ry="12" fill="none" stroke="#0072CE" stroke-width="1" opacity="0.3"/>
  <ellipse cx="120" cy="140" rx="65" ry="12" fill="none" stroke="#0072CE" stroke-width="1" opacity="0.3"/>

  <!-- Component/chip overlay -->
  <g transform="translate(240, 100)">
    <!-- Main chip rectangle -->
    <rect x="0" y="0" width="100" height="100" class="neutral" stroke="#0072CE" stroke-width="2" rx="3"/>

    <!-- Internal circuit grid -->
    <line x1="20" y1="0" x2="20" y2="100" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="40" y1="0" x2="40" y2="100" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="60" y1="0" x2="60" y2="100" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="80" y1="0" x2="80" y2="100" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>

    <line x1="0" y1="25" x2="100" y2="25" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="50" x2="100" y2="50" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="0" y1="75" x2="100" y2="75" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>

    <!-- Grid nodes -->
    <circle cx="20" cy="25" r="2.5" class="accent"/>
    <circle cx="40" cy="50" r="2.5" class="accent"/>
    <circle cx="60" cy="75" r="2.5" class="accent"/>
    <circle cx="80" cy="30" r="2.5" class="accent"/>

    <!-- Corner markers -->
    <circle cx="5" cy="5" r="1.5" class="primary"/>
    <circle cx="95" cy="5" r="1.5" class="primary"/>
    <circle cx="5" cy="95" r="1.5" class="primary"/>
    <circle cx="95" cy="95" r="1.5" class="primary"/>
  </g>

</svg>