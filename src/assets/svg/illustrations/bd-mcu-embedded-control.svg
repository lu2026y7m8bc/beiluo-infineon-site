<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 500 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="bd-mcu-embedded-title">
  <defs>
    <style>
      .block { fill: #E8F1FA; stroke: #0072CE; stroke-width: 2; }
      .label { font-family: Arial, sans-serif; font-size: 12px; fill: #0072CE; text-anchor: middle; font-weight: 500; }
      .label-sub { font-family: Arial, sans-serif; font-size: 10px; fill: #666666; text-anchor: middle; }
      .arrow { stroke: #0072CE; stroke-width: 2.5; fill: none; marker-end: url(#arrow-mcu); }
      .part { font-family: Arial, sans-serif; font-size: 9px; fill: #F5821F; text-anchor: middle; font-weight: bold; }
    </style>
    <marker id="arrow-mcu" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0072CE"/>
    </marker>
  </defs>
  <title id="bd-mcu-embedded-title">Block diagram: input sensor signals processed by a dual AURIX TC264DA and XMC4700 MCU control loop driving actuator outputs with an IKW40N120H3 IGBT power stage</title>

  <rect width="500" height="300" fill="transparent"/>

  <!-- Input signals -->
  <g>
    <rect x="15" y="110" width="85" height="70" class="block" rx="4"/>
    <text x="57" y="140" class="label" font-size="11">Input</text>
    <text x="57" y="156" class="label-sub">Signals</text>
  </g>
  <path class="arrow" d="M 100 145 L 140 145"/>

  <!-- Dual MCU block -->
  <g>
    <rect x="140" y="80" width="130" height="60" class="block" rx="4"/>
    <text x="205" y="105" class="label" font-size="11">Safety MCU</text>
    <text x="205" y="122" class="part">TC264DA</text>
  </g>
  <g>
    <rect x="140" y="150" width="130" height="60" class="block" rx="4"/>
    <text x="205" y="175" class="label" font-size="11">Control MCU</text>
    <text x="205" y="192" class="part">XMC4700-F100K2048</text>
  </g>
  <line x1="270" y1="110" x2="270" y2="180" stroke="#F5821F" stroke-width="1.5" stroke-dasharray="3 2"/>
  <path class="arrow" d="M 270 145 L 320 145"/>

  <!-- IGBT power stage -->
  <g>
    <rect x="320" y="105" width="100" height="80" class="block" rx="4"/>
    <text x="370" y="132" class="label" font-size="11">IGBT Power</text>
    <text x="370" y="150" class="label" font-size="11">Stage</text>
    <text x="370" y="168" class="part">IKW40N120H3</text>
  </g>
  <path class="arrow" d="M 420 145 L 460 145"/>

  <!-- Actuator output -->
  <g transform="translate(455, 120)">
    <circle cx="20" cy="20" r="20" fill="none" stroke="#0072CE" stroke-width="2.5"/>
    <line x1="20" y1="4" x2="20" y2="36" stroke="#0072CE" stroke-width="1.5"/>
    <line x1="4" y1="20" x2="36" y2="20" stroke="#0072CE" stroke-width="1.5"/>
    <text x="20" y="55" class="label-sub" font-size="9">Actuator</text>
  </g>
</svg>
