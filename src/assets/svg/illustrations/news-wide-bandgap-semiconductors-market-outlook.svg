<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="news-wbg-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .success { fill: #1F9D55; }
    </style>
  </defs>
  <title id="news-wbg-title">Hexagonal crystal lattice representing silicon carbide and gallium nitride wide bandgap materials next to a rising market chart</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- Hexagonal crystal lattice (SiC/GaN crystal structure motif) -->
  <g transform="translate(60, 70)" stroke="#0072CE" stroke-width="1.5" fill="none">
    <polygon points="40,0 80,20 80,60 40,80 0,60 0,20" class="neutral"/>
    <polygon points="40,0 80,20 80,60 40,80 0,60 0,20" transform="translate(64,0)" class="neutral"/>
    <polygon points="40,0 80,20 80,60 40,80 0,60 0,20" transform="translate(32,60)" class="neutral"/>
    <polygon points="40,0 80,20 80,60 40,80 0,60 0,20" transform="translate(96,60)" class="neutral"/>
  </g>
  <circle cx="100" cy="110" r="5" class="accent"/>
  <circle cx="164" cy="110" r="5" class="accent"/>
  <circle cx="132" cy="150" r="5" class="accent"/>
  <circle cx="196" cy="150" r="5" class="accent"/>

  <text x="132" y="215" font-family="Arial, sans-serif" font-size="13" fill="#0072CE" text-anchor="middle" font-weight="bold">SiC · GaN</text>

  <!-- Rising market bar chart -->
  <g transform="translate(255, 60)">
    <rect x="0" y="120" width="24" height="40" class="neutral" stroke="#0072CE" stroke-width="1.5"/>
    <rect x="34" y="95" width="24" height="65" class="neutral" stroke="#0072CE" stroke-width="1.5"/>
    <rect x="68" y="60" width="24" height="100" class="neutral" stroke="#0072CE" stroke-width="1.5"/>
    <rect x="102" y="20" width="24" height="140" class="accent"/>
    <line x1="0" y1="160" x2="126" y2="160" stroke="#5B6B7F" stroke-width="1.5"/>
    <polyline points="12,118 46,93 80,58 114,18" fill="none" stroke="#1F9D55" stroke-width="2.5"/>
    <polygon points="114,18 105,22 111,30" class="success"/>
  </g>
</svg>
