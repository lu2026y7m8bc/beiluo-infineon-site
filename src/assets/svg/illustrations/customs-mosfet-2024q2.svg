<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="customs-mosfet-title">
  <title id="customs-mosfet-title">BeiLuo customs declaration document for Infineon MOSFET import, 2024 Q2</title>
  <rect width="400" height="300" fill="#F8F9FA"/>
  <rect x="60" y="20" width="280" height="260" rx="4" fill="#FFFFFF" stroke="#0072CE" stroke-width="2"/>

  <!-- Header bar -->
  <rect x="60" y="20" width="280" height="34" rx="4" fill="#0072CE"/>
  <text x="200" y="42" text-anchor="middle" font-family="Arial, sans-serif" font-size="13" font-weight="bold" fill="#FFFFFF">CUSTOMS IMPORT DECLARATION</text>

  <!-- Body text lines -->
  <g fill="#CBD5DE">
    <rect x="80" y="70" width="180" height="6" rx="3"/>
    <rect x="80" y="86" width="240" height="6" rx="3"/>
    <rect x="80" y="102" width="150" height="6" rx="3"/>
  </g>

  <!-- Data table -->
  <rect x="80" y="122" width="240" height="86" rx="2" fill="none" stroke="#B9C4CF" stroke-width="1"/>
  <line x1="80" y1="143" x2="320" y2="143" stroke="#B9C4CF" stroke-width="1"/>
  <line x1="80" y1="164" x2="320" y2="164" stroke="#B9C4CF" stroke-width="1"/>
  <line x1="80" y1="186" x2="320" y2="186" stroke="#B9C4CF" stroke-width="1"/>
  <line x1="200" y1="122" x2="200" y2="208" stroke="#B9C4CF" stroke-width="1"/>
  <g fill="#5B6B7F" font-family="Arial, sans-serif" font-size="9">
    <text x="88" y="136">Product</text>
    <text x="208" y="136">Infineon MOSFET</text>
    <text x="88" y="157">HS Code</text>
    <text x="208" y="157">8541.29</text>
    <text x="88" y="178">Quantity</text>
    <text x="208" y="178">Verified lot</text>
    <text x="88" y="199">Origin</text>
    <text x="208" y="199">Authorized channel</text>
  </g>

  <!-- MOSFET badge -->
  <g transform="translate(84, 226)" stroke="#0072CE" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <line x1="-2" y1="0" x2="3" y2="0"/>
    <line x1="3" y1="-4" x2="3" y2="4"/>
    <line x1="5" y1="-4" x2="5" y2="-1"/>
    <line x1="5" y1="1" x2="5" y2="4"/>
    <line x1="5" y1="-4" x2="16" y2="-4"/>
    <line x1="5" y1="4" x2="16" y2="4"/>
    <line x1="16" y1="-6" x2="16" y2="-2"/>
    <line x1="16" y1="2" x2="16" y2="6"/>
    <polyline points="8,2 8,-2 12,0"/>
  </g>
  <text x="150" y="232" text-anchor="middle" font-family="Arial, sans-serif" font-size="10" font-weight="bold" fill="#0072CE">2024 Q2</text>

  <!-- Approval stamp -->
  <g transform="translate(290, 220)">
    <circle cx="0" cy="0" r="26" fill="none" stroke="#F5821F" stroke-width="2.5" transform="rotate(-12)"/>
    <text x="0" y="4" text-anchor="middle" font-family="Arial, sans-serif" font-size="9" font-weight="bold" fill="#F5821F" transform="rotate(-12)">CLEARED</text>
  </g>
</svg>
