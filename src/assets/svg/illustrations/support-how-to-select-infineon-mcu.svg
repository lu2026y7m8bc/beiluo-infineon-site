<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="support-mcu-compare-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
    </style>
  </defs>
  <title id="support-mcu-compare-title">Three Infineon microcontroller chips labeled AURIX, XMC, and PSoC side by side on a comparison balance scale</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- Three MCU chips -->
  <g transform="translate(50, 70)">
    <rect x="0" y="0" width="70" height="70" class="primary" rx="4"/>
    <rect x="6" y="6" width="58" height="58" class="neutral" rx="2"/>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="10" fill="#0072CE" text-anchor="middle" font-weight="bold">AURIX</text>
  </g>

  <g transform="translate(165, 60)">
    <rect x="0" y="0" width="70" height="70" class="accent" rx="4"/>
    <rect x="6" y="6" width="58" height="58" class="neutral" rx="2"/>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="11" fill="#D96D10" text-anchor="middle" font-weight="bold">XMC</text>
  </g>

  <g transform="translate(280, 70)">
    <rect x="0" y="0" width="70" height="70" class="primary" rx="4"/>
    <rect x="6" y="6" width="58" height="58" class="neutral" rx="2"/>
    <text x="35" y="40" font-family="Arial, sans-serif" font-size="10" fill="#0072CE" text-anchor="middle" font-weight="bold">PSoC 6</text>
  </g>

  <!-- Balance scale below -->
  <g transform="translate(200, 170)">
    <line x1="0" y1="0" x2="0" y2="70" stroke="#5B6B7F" stroke-width="4"/>
    <line x1="-110" y1="10" x2="110" y2="10" stroke="#5B6B7F" stroke-width="4"/>
    <line x1="-110" y1="10" x2="-110" y2="35" stroke="#5B6B7F" stroke-width="2"/>
    <line x1="110" y1="10" x2="110" y2="35" stroke="#5B6B7F" stroke-width="2"/>
    <path d="M -135 35 Q -110 55 -85 35 Z" class="neutral" stroke="#0072CE" stroke-width="2"/>
    <path d="M 85 35 Q 110 55 135 35 Z" class="neutral" stroke="#0072CE" stroke-width="2"/>
    <polygon points="-10,70 10,70 0,85" fill="#5B6B7F"/>
    <ellipse cx="0" cy="88" rx="26" ry="6" fill="#5B6B7F"/>
  </g>

  <text x="200" y="270" font-family="Arial, sans-serif" font-size="12" fill="#5B6B7F" text-anchor="middle">Choosing the right MCU family</text>
</svg>
