<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="news-igbt-stock-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .success { fill: #1F9D55; }
      .line { stroke: #0072CE; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <title id="news-igbt-stock-title">Warehouse shelves stocked with Infineon IGBT modules and a rising inventory growth arrow</title>

  <rect width="400" height="300" fill="transparent"/>

  <!-- Warehouse shelving unit -->
  <rect x="40" y="70" width="180" height="12" class="primary" rx="2"/>
  <rect x="40" y="130" width="180" height="12" class="primary" rx="2"/>
  <rect x="40" y="190" width="180" height="12" class="primary" rx="2"/>
  <rect x="40" y="70" width="8" height="132" class="primary"/>
  <rect x="212" y="70" width="8" height="132" class="primary"/>

  <!-- Stacked boxes on shelves (stock units) -->
  <rect x="55" y="42" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="95" y="42" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="135" y="42" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="175" y="46" width="30" height="24" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>

  <rect x="55" y="102" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="95" y="102" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="135" y="98" width="34" height="32" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>

  <rect x="55" y="162" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="95" y="162" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="135" y="162" width="34" height="28" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>
  <rect x="175" y="158" width="30" height="32" class="neutral" stroke="#0072CE" stroke-width="1.5" rx="2"/>

  <!-- IGBT module icon inside one box, called out -->
  <g transform="translate(66, 108)">
    <rect x="0" y="0" width="16" height="16" class="accent" rx="1"/>
    <line x1="4" y1="4" x2="4" y2="12" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="8" y1="4" x2="8" y2="12" stroke="#FFFFFF" stroke-width="1"/>
    <line x1="12" y1="4" x2="12" y2="12" stroke="#FFFFFF" stroke-width="1"/>
  </g>

  <!-- Growth arrow and chart -->
  <g transform="translate(255, 60)">
    <polyline points="0,140 30,100 60,115 95,55 130,20" class="line" stroke="#1F9D55" stroke-width="3"/>
    <polygon points="130,20 118,26 124,34" class="success"/>
    <circle cx="0" cy="140" r="4" class="success"/>
    <circle cx="30" cy="100" r="4" class="success"/>
    <circle cx="60" cy="115" r="4" class="success"/>
    <circle cx="95" cy="55" r="4" class="success"/>
  </g>

  <!-- Base line -->
  <line x1="30" y1="222" x2="230" y2="222" stroke="#C5D8EE" stroke-width="2"/>
</svg>
