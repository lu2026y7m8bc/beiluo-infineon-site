<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="contact-hero-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
    </style>
  </defs>
  <title id="contact-hero-title">Contact BeiLuo for electronic component inquiries</title>

  <!-- Background -->
  <rect width="400" height="300" fill="transparent"/>

  <!-- Envelope -->
  <g transform="translate(60, 80)">
    <!-- Envelope body -->
    <rect x="0" y="0" width="130" height="90" class="neutral" stroke="#0072CE" stroke-width="2" rx="2"/>

    <!-- Envelope flap -->
    <polygon points="0,0 65,45 130,0" class="primary" stroke="#0072CE" stroke-width="1.5"/>

    <!-- Letter inside hint -->
    <rect x="10" y="30" width="110" height="50" class="primary" opacity="0.3" rx="1"/>
    <line x1="15" y1="40" x2="115" y2="40" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="50" x2="115" y2="50" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
    <line x1="15" y1="60" x2="90" y2="60" stroke="#0072CE" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Circuit board section -->
  <g transform="translate(220, 100)">
    <!-- PCB board -->
    <rect x="0" y="0" width="140" height="100" class="neutral" stroke="#0072CE" stroke-width="2" rx="3"/>

    <!-- Trace lines -->
    <path d="M 10 20 L 40 20 L 40 50 L 70 50 L 70 80 L 100 80"
          stroke="#0072CE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M 130 30 L 100 30 L 100 60"
          stroke="#0072CE" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Via pads -->
    <circle cx="10" cy="20" r="3" class="accent"/>
    <circle cx="40" cy="20" r="3" class="accent"/>
    <circle cx="40" cy="50" r="3" class="accent"/>
    <circle cx="70" cy="50" r="3" class="accent"/>
    <circle cx="70" cy="80" r="3" class="accent"/>
    <circle cx="100" cy="80" r="3" class="accent"/>
    <circle cx="130" cy="30" r="3" class="accent"/>
    <circle cx="100" cy="30" r="3" class="accent"/>
    <circle cx="100" cy="60" r="3" class="accent"/>

    <!-- Component indicators -->
    <rect x="15" y="65" width="15" height="20" class="primary" opacity="0.5"/>
    <rect x="85" y="10" width="15" height="15" class="primary" opacity="0.5"/>
  </g>

</svg>