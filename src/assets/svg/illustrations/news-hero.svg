<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="news-hero-title">
  <defs>
    <style>
      .primary { fill: #0072CE; }
      .accent { fill: #F5821F; }
      .neutral { fill: #E8F1FA; }
      .text-line { stroke: #0072CE; stroke-width: 2; fill: none; }
    </style>
  </defs>
  <title id="news-hero-title">Technology news and industry insights</title>

  <!-- Background -->
  <rect width="400" height="300" fill="transparent"/>

  <!-- Newspaper/article shape -->
  <rect x="50" y="50" width="200" height="180" class="neutral" rx="4"/>
  <rect x="50" y="50" width="200" height="25" class="primary" rx="4"/>
  <line x1="65" y1="90" x2="175" y2="90" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="105" x2="175" y2="105" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="120" x2="175" y2="120" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="135" x2="140" y2="135" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="155" x2="175" y2="155" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="170" x2="175" y2="170" class="text-line" stroke-width="1.5"/>
  <line x1="65" y1="185" x2="140" y2="185" class="text-line" stroke-width="1.5"/>

  <!-- Chip/circuit overlay -->
  <g transform="translate(260, 80)">
    <!-- Chip body -->
    <rect x="0" y="0" width="80" height="80" class="primary" rx="3"/>
    <rect x="5" y="5" width="70" height="70" class="neutral" rx="2"/>

    <!-- Chip pins (legs) -->
    <rect x="-5" y="15" width="5" height="8" class="accent"/>
    <rect x="-5" y="35" width="5" height="8" class="accent"/>
    <rect x="-5" y="55" width="5" height="8" class="accent"/>
    <rect x="80" y="15" width="5" height="8" class="accent"/>
    <rect x="80" y="35" width="5" height="8" class="accent"/>
    <rect x="80" y="55" width="5" height="8" class="accent"/>

    <!-- Internal circuit lines -->
    <line x1="15" y1="15" x2="15" y2="65" stroke="#0072CE" stroke-width="1.5"/>
    <line x1="35" y1="15" x2="35" y2="65" stroke="#0072CE" stroke-width="1.5"/>
    <line x1="55" y1="15" x2="55" y2="65" stroke="#0072CE" stroke-width="1.5"/>
    <circle cx="25" cy="25" r="2" class="accent"/>
    <circle cx="45" cy="40" r="2" class="accent"/>
    <circle cx="65" cy="55" r="2" class="accent"/>
  </g>

  <!-- Decorative circuit line connecting -->
  <path d="M 250 120 Q 255 110 260 115" stroke="#F5821F" stroke-width="1.5" fill="none"/>

</svg>