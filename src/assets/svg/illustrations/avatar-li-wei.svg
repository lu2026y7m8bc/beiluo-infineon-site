<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" role="img" aria-labelledby="avatar-li-wei-title">
  <title id="avatar-li-wei-title">Li Wei - BeiLuo FAE Engineer avatar</title>

  <!-- background -->
  <rect width="200" height="200" fill="#F8F9FA"/>

  <!-- shoulders / collared shirt (power semiconductor FAE) -->
  <path d="M30 200 Q30 150 70 140 L100 155 L130 140 Q170 150 170 200 Z" fill="#0072CE"/>

  <!-- collar trim accent -->
  <path d="M88 148 L100 162 L112 148" fill="none" stroke="#F5821F" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- neck -->
  <rect x="88" y="118" width="24" height="30" fill="#5B6B7F"/>

  <!-- head -->
  <circle cx="100" cy="95" r="40" fill="#5B6B7F"/>

  <!-- short cropped hair -->
  <ellipse cx="100" cy="72" rx="41" ry="20" fill="#1A2433"/>

  <!-- glasses accent -->
  <rect x="72" y="92" width="24" height="16" rx="3" fill="none" stroke="#F5821F" stroke-width="3"/>
  <rect x="104" y="92" width="24" height="16" rx="3" fill="none" stroke="#F5821F" stroke-width="3"/>
  <line x1="96" y1="100" x2="104" y2="100" stroke="#F5821F" stroke-width="3"/>
</svg>
